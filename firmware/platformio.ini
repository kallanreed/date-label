[platformio]
default_envs = seeed_xiao_esp32c3

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_build_src = yes
lib_deps =
  h2zero/NimBLE-Arduino @ ^2.3.6

[env:native]
platform = native
build_flags =
  -std=c++17
build_src_filter =
test_build_src = yes
test_framework = unity
